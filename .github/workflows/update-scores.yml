name: Update Scores

on:
  # TOURNAMENT ENDED 2026-07-19 (Spain champion). Automatic scores are disabled.
  # The schedule below is intentionally commented out — re-enable it for a future
  # tournament by uncommenting and updating the month field / date gate.
  #
  # schedule:
  #   # Every 20 minutes, ALL DAY, in June & July. Matches span 12 timezones and
  #   # kick off across the full 16:00–04:00 UTC range; running 24h removes any
  #   # coverage gap and sidesteps timezone math (GitHub cron is always UTC). The
  #   # in-job date check still limits actual work to the tournament window.
  #   # Offset minutes (9,29,49) instead of */20 to avoid GitHub's on-the-hour
  #   # scheduler congestion, which delays/drops runs at :00,:20,... See OPERATIONS.md.
  #   - cron: '9,29,49 * * 6-7 *'
  workflow_dispatch: # Manual trigger still available (e.g. to fix a late correction)

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tournament window
        id: check-date
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Manual trigger — skipping date check."
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          TODAY=$(date +%Y-%m-%d)
          if [[ "$TODAY" < "2026-06-11" || "$TODAY" > "2026-07-19" ]]; then
            echo "Outside tournament window ($TODAY). Skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Inside tournament window ($TODAY). Proceeding."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-python@v5
        if: steps.check-date.outputs.skip == 'false'
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.check-date.outputs.skip == 'false'
        run: pip install -r requirements.txt

      - name: Update scores
        if: steps.check-date.outputs.skip == 'false'
        run: python update_scores.py --live

      - name: Regenerate calendar
        if: steps.check-date.outputs.skip == 'false'
        run: python generate_calendar.py

      - name: Commit and push if changed
        if: steps.check-date.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scores.json docs/fifa-worldcup-2026.ics
          if git diff --staged --quiet; then
            echo "No score changes. Skipping commit."
          else
            git commit -m "Auto-update scores $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
